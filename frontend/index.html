<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FIBO Counterparty Risk — neovis.js</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg:#0f172a; --panel:#111c33; --border:#1e2a4a; --text:#e6edf7; --muted:#94a3b8; --accent:#38bdf8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:grid;grid-template-columns:340px 1fr;height:100vh}
  aside{background:var(--panel);border-right:1px solid var(--border);padding:16px;overflow:auto}
  h1{font-size:16px;margin:0 0 4px;color:var(--accent)}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:18px 0 6px}
  p.lead{color:var(--muted);font-size:12px;margin:0 0 12px}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
  input,select,button,textarea{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:#0b1426;color:var(--text);font:inherit}
  textarea{min-height:120px;font-family:ui-monospace,Consolas,monospace;font-size:12px}
  button{background:var(--accent);color:#04263b;border:0;font-weight:600;cursor:pointer;margin-top:6px}
  button.secondary{background:#1e2a4a;color:var(--text)}
  .preset{display:block;width:100%;text-align:left;background:#0b1426;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;margin-bottom:6px;cursor:pointer}
  .preset:hover{border-color:var(--accent)}
  .preset b{color:var(--accent)}
  #viz{width:100%;height:100vh;background:#0a1224}
  .legend{font-size:11px;color:var(--muted)}
  .legend span{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .err{color:#f87171;font-size:12px;white-space:pre-wrap}
  .info{color:#34d399;font-size:12px;margin:4px 0}
</style>
</head>
<body>
<aside>
  <h1>FIBO Counterparty Risk</h1>
  <p class="lead">neovis.js view of the seeded LEI / ownership / control graph in your local Neo4j.</p>

  <h2>Connection</h2>
  <label>URL <input id="url" value="neo4j://127.0.0.1:7687" /></label>
  <label>User <input id="user" value="neo4j" /></label>
  <label>Password <input id="pw" type="password" value="12345678" /></label>
  <label>Database <input id="db" value="neo4j" /></label>
  <button id="testConn" class="secondary">Test Connection</button>
  <div class="info" id="connStatus"></div>

  <h2>Presets</h2>
  <button class="preset" data-q="MATCH (n:LegalEntity)-[r]->(m:LegalEntity) RETURN n,r,m">
    <b>Full entity network</b><br><span class="legend">All inter-entity relationships</span>
  </button>
  <button class="preset" data-q="MATCH (n:LegalEntity)-[r:HAS_OWNERSHIP_IN]->(m:LegalEntity) RETURN n,r,m">
    <b>Ownership network</b><br><span class="legend">All HAS_OWNERSHIP_IN edges</span>
  </button>
  <button class="preset" data-q="MATCH (b:Bank)-[r:LENDS_TO]->(e:LegalEntity) RETURN b,r,e">
    <b>Bank lending exposures</b>
  </button>
  <button class="preset" data-q="MATCH p=(root:LegalEntity {name:'Apex Holdings Inc.'})-[:HAS_OWNERSHIP_IN|HAS_CONTROLLING_PARTY*1..5]->(c) RETURN p">
    <b>Apex group cascade</b>
  </button>
  <button class="preset" data-q="MATCH p=(e:LegalEntity)-[:HAS_OWNERSHIP_IN*2..6]->(e) RETURN p LIMIT 5">
    <b>Circular ownership (KYC red flag)</b>
  </button>
  <button class="preset" data-q="MATCH (e:LegalEntity)-[r:REGULATED_BY]->(reg:Regulator) RETURN e,r,reg">
    <b>Regulatory perimeter</b>
  </button>
  <button class="preset" data-q="MATCH (e:LegalEntity)-[r:INCORPORATED_IN]->(j:Jurisdiction) RETURN e,r,j">
    <b>Jurisdiction map</b>
  </button>
  <button class="preset" data-q="MATCH (sub:LegalEntity)-[r:HAS_CONTROLLING_PARTY]->(parent:LegalEntity) RETURN sub,r,parent">
    <b>Control hierarchy</b>
  </button>
  <button class="preset" data-q="MATCH (c:Class)-[r:SCO]->(p:Class) RETURN c,r,p LIMIT 100">
    <b>FIBO T-Box (ontology classes)</b>
  </button>

  <h2>Custom Cypher</h2>
  <textarea id="cypher">MATCH (n:LegalEntity)-[r]->(m:LegalEntity) RETURN n,r,m</textarea>
  <button id="run">Render</button>
  <button id="stabilize" class="secondary">Stabilize layout</button>
  <button id="clear" class="secondary">Clear</button>

  <h2>Legend</h2>
  <div class="legend">
    <div><span style="background:#f59e0b"></span>Bank</div>
    <div><span style="background:#22d3ee"></span>Holding</div>
    <div><span style="background:#a78bfa"></span>Corporation / LegalEntity</div>
    <div><span style="background:#34d399"></span>Jurisdiction</div>
    <div><span style="background:#f472b6"></span>Regulator</div>
    <div><span style="background:#94a3b8"></span>Sector</div>
    <div><span style="background:#64748b"></span>Class (ontology)</div>
  </div>
  <p class="lead" id="status"></p>
  <div class="err" id="err"></div>
</aside>
<main><div id="viz"></div></main>

<script src="https://unpkg.com/neovis.js@2.1.0/dist/neovis.js"></script>
<script>
let viz;
const $ = id => document.getElementById(id);

function buildConfig(cypher) {
  return {
    containerId: 'viz',
    neo4j: {
      serverUrl:      $('url').value.replace('neo4j://', 'bolt://'),
      serverUser:     $('user').value,
      serverPassword: $('pw').value,
      serverDatabase: $('db').value
    },
    visConfig: {
      nodes: { shape: 'dot', font: { color: '#e6edf7', size: 14 } },
      edges: { arrows: { to: { enabled: true, scaleFactor: 0.7 } }, font: { color: '#94a3b8', size: 10, strokeWidth: 0 } },
      physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -50, springLength: 120 }, stabilization: { iterations: 200 } }
    },
    labels: {
      LegalEntity:  { label: 'name', value: 'systemicScore', group: 'communityId', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: '#a78bfa', shape: 'dot' } } },
      Corporation:  { label: 'name', value: 'systemicScore', group: 'communityId', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: '#a78bfa', shape: 'dot' } } },
      Holding:      { label: 'name', value: 'systemicScore', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: '#22d3ee', shape: 'dot' } } },
      Bank:         { label: 'name', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: '#f59e0b', shape: 'star', size: 30 } } },
      Jurisdiction: { label: 'code', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: '#34d399', shape: 'diamond', size: 15 } } },
      Regulator:    { label: 'name', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: '#f472b6', shape: 'triangle', size: 20 } } },
      Sector:       { label: 'name', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: '#94a3b8', shape: 'square', size: 12 } } },
      Class:        { label: 'name', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: '#64748b', shape: 'dot', size: 10 } } }
    },
    relationships: {
      HAS_OWNERSHIP_IN:      { value: 'weight', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#38bdf8' }, label: 'owns' } } },
      HAS_CONTROLLING_PARTY: { [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#f87171' }, dashes: true, label: 'controls' } } },
      LENDS_TO:              { value: 'exposure_musd', [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#fbbf24' }, label: 'lends' } } },
      INCORPORATED_IN:       { [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#34d399', opacity: 0.5 } } } },
      OPERATES_IN:           { [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#94a3b8', opacity: 0.4 } } } },
      REGULATED_BY:          { [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#f472b6' } } } },
      SCO:                   { [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#475569' }, label: 'subClassOf' } } },
      JOINT_VENTURE:         { [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#a3e635' }, dashes: [5,5] } } },
      SUPPLIES_TO:           { [NeoVis.NEOVIS_ADVANCED_CONFIG]: { static: { color: { color: '#fb923c' } } } }
    },
    initialCypher: cypher
  };
}

function render(cypher) {
  $('err').textContent = '';
  $('status').textContent = 'Querying...';
  try {
    if (viz) { viz.clearNetwork(); }
    viz = new NeoVis.default(buildConfig(cypher));
    viz.registerOnEvent('completed', e => {
      $('status').textContent = 'Rendered. Nodes: ' + (viz.nodes?.length || '?') + ', Edges: ' + (viz.edges?.length || '?');
    });
    viz.registerOnEvent('error', e => {
      $('err').textContent = (e && e.error && e.error.message) || JSON.stringify(e);
      $('status').textContent = '';
    });
    viz.render();
  } catch (e) {
    $('err').textContent = String(e);
    $('status').textContent = '';
  }
}

$('testConn').addEventListener('click', async () => {
  $('connStatus').textContent = 'Testing...';
  try {
    const tmpViz = new NeoVis.default(buildConfig('RETURN 1'));
    tmpViz.registerOnEvent('completed', () => { $('connStatus').textContent = 'Connected!'; tmpViz.clearNetwork(); });
    tmpViz.registerOnEvent('error', e => { $('connStatus').textContent = 'Failed: ' + ((e && e.error && e.error.message) || JSON.stringify(e)); });
    tmpViz.render();
  } catch(e) { $('connStatus').textContent = 'Error: ' + e; }
});

document.querySelectorAll('.preset').forEach(b => b.addEventListener('click', () => {
  $('cypher').value = b.dataset.q; render(b.dataset.q);
}));
$('run').addEventListener('click', () => render($('cypher').value));
$('stabilize').addEventListener('click', () => viz && viz.stabilize());
$('clear').addEventListener('click', () => viz && viz.clearNetwork());

window.addEventListener('load', () => render($('cypher').value));
</script>
</body>
</html>
